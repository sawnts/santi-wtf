<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#19191b"/>

  <!-- subtle border frame -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#303136" stroke-width="1" rx="8"/>

  <!-- macos window dots -->
  <g>
    <circle cx="72" cy="72" r="6" fill="#46484f"/>
    <circle cx="92" cy="72" r="6" fill="#46484f"/>
    <circle cx="112" cy="72" r="6" fill="#46484f"/>
  </g>

  <!-- title -->
  <text x="100" y="240" font-family="ui-monospace, Menlo, Monaco, monospace" font-weight="600" font-size="120" fill="#eeeef0" letter-spacing="-2">santi.wtf</text>

  <!-- amber cursor block -->
  <rect x="772" y="142" width="24" height="120" fill="#ffb000"/>

  <!-- file tree -->
  <g font-family="ui-monospace, Menlo, Monaco, monospace" font-size="38" fill="#797b86">
    <text x="100" y="350">├─ readme</text>
    <text x="100" y="402">├─ notes/</text>
    <text x="100" y="454">├─ newsletter/</text>
    <text x="100" y="506">└─ photos/</text>
  </g>

  <!-- tagline -->
  <text x="100" y="570" font-family="ui-monospace, Menlo, Monaco, monospace" font-size="22" fill="#5f606a">peruvian-born creative · based in seattle</text>

  <!-- v3 tag bottom-right -->
  <text x="1110" y="570" font-family="ui-monospace, Menlo, Monaco, monospace" font-size="22" fill="#46484f" text-anchor="end">v3</text>
</svg>
